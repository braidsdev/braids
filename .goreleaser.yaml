version: 2

project_name: braids

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: braidsdev
      name: homebrew-tap
    homepage: "https://braids.dev"
    description: "Config-driven API composition — Terraform for APIs"
    license: "MIT"
    install: |
      bin.install "braids"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: braidsdev
    name: braids
