name: shopify
version: "1.0"
base_url: https://${store}.myshopify.com/admin/api/2024-01
auth:
  type: header
  header_name: X-Shopify-Access-Token
  token_field: access_token
pagination:
  type: link_header
resources:
  customers:
    path: /customers.json
    method: GET
    data_field: customers
  orders:
    path: /orders.json
    method: GET
    data_field: orders
