name: stripe
version: "1.0"
base_url: https://api.stripe.com/v1
auth:
  type: bearer
  token_field: api_key
pagination:
  type: cursor
  cursor_param: starting_after
  cursor_field: id
  has_more_field: has_more
  data_field: data
resources:
  customers:
    path: /customers
    method: GET
  charges:
    path: /charges
    method: GET
